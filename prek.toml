fail_fast = false
exclude = """
(?x)^(
  lua/.*.lua|
)$
"""

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "check-added-large-files" },
]

[[repos]]
repo = "https://github.com/executablebooks/mdformat"
rev = "1.0.0"
hooks = [
    { id = "mdformat", language = "python", additional_dependencies = ["mdformat-mkdocs==5.1.3", "mdformat-footnote==0.1.2"], priority = 0 },
]

[[repos]]
repo = "https://github.com/igorshubovych/markdownlint-cli"
rev = "v0.47.0"
hooks = [
    { id = "markdownlint-fix", priority = 1 },
]

[[repos]]
repo = "https://github.com/trufflesecurity/trufflehog"
rev = "v3.88.12"
hooks = [
    { id = "trufflehog", name = "TruffleHog", always_run = true },
]
